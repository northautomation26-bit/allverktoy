<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tollklarering â Rykkattest Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
  }

  .site-header {
    background: linear-gradient(135deg, #003366, #004d99);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .logo-circle {
    width: 52px; height: 52px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: #003366;
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 20px; letter-spacing: 1px; }
  .header-text p { font-size: 12px; opacity: 0.75; margin-top: 3px; }

  .container { max-width: 780px; margin: 0 auto; padding: 32px 16px; }

  .tabs {
    display: flex;
    border-bottom: 2px solid #003366;
  }
  .tab-btn {
    padding: 12px 28px;
    border: none; background: none;
    font-size: 15px; font-weight: 600;
    color: #888; cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active { color: #003366; border-bottom-color: #003366; }
  .tab-btn:hover:not(.active) { color: #004d99; }

  .card {
    background: white;
    border-radius: 0 8px 8px 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px;
  }

  .view { display: none; }
  .view.active { display: block; }

  .section-title {
    font-size: 16px; font-weight: 700; color: #003366;
    margin-bottom: 20px; padding-bottom: 10px;
    border-bottom: 1px solid #e2e8f0;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 600; color: #555; }
  input, textarea {
    padding: 10px 14px;
    border: 1.5px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    color: #2d3748;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
    background: #fff;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #003366;
    box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
  }
  textarea { resize: vertical; min-height: 80px; }

  .form-divider { height: 1px; background: #e2e8f0; grid-column: 1 / -1; margin: 4px 0; }

  .btn {
    padding: 12px 28px;
    border: none; border-radius: 6px;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #003366; color: white; }
  .btn-primary:hover { background: #004d99; }
  .btn-primary:disabled { background: #7a9bbf; cursor: not-allowed; }

  .form-actions { margin-top: 24px; display: flex; gap: 12px; align-items: center; }

  .alert {
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    display: none;
    font-weight: 500;
  }
  .alert.show { display: block; }
  .alert-success { background: #d4edda; color: #155724; border: 1px solid #b8dbc4; }
  .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f0b8bc; }

  .result-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 24px;
    margin-top: 24px;
    display: none;
  }
  .result-box.show { display: block; }
  .result-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid #e2e8f0;
  }
  .badge-cleared {
    background: #28a745; color: white;
    padding: 6px 16px; border-radius: 20px;
    font-weight: 700; font-size: 14px;
    white-space: nowrap;
  }
  .result-ref-label { font-weight: 700; color: #003366; font-size: 16px; }

  .result-table { width: 100%; border-collapse: collapse; }
  .result-table td { padding: 9px 6px; font-size: 14px; border-bottom: 1px solid #eef0f3; vertical-align: top; }
  .result-table td:first-child { font-weight: 600; color: #003366; width: 44%; }

  .resend-note { margin-top: 16px; font-size: 13px; color: #666; font-style: italic; }

  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 3px solid #ddd;
    border-top-color: #003366;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer-note {
    text-align: center;
    color: #bbb;
    font-size: 12px;
    margin-top: 28px;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .card { padding: 20px; }
    .site-header { padding: 16px 20px; }
    .header-text h1 { font-size: 15px; }
    .tab-btn { padding: 10px 18px; font-size: 14px; }
  }
</style>
</head>
